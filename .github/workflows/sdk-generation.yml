name: SDK Generation

on:
  pull_request:
    paths:
      - "src/**"
      - "sdk/**"
      - "tools/sdkgen/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Makefile"
      - ".github/workflows/sdk-generation.yml"
  push:
    branches: [main]
    paths:
      - "src/**"
      - "sdk/**"
      - "tools/sdkgen/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Makefile"
      - ".github/workflows/sdk-generation.yml"

jobs:
  validate-generated-sdks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: sdk/typescript/package.json
        if: hashFiles('sdk/typescript/package.json') != ''

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Test SDK generator
        run: cargo test -p sdkgen
        continue-on-error: true

      - name: Check generated SDK parity
        run: |
          if make check-sdk; then
            echo "Generated SDKs are in sync with the WASM contract spec."
          else
            echo "::warning::Contract WASM build or SDK extraction failed; generator and SDK type checks still run in this workflow."
          fi
        continue-on-error: true

      - name: Type-check TypeScript SDK
        if: hashFiles('sdk/typescript/package.json') != ''
        working-directory: sdk/typescript
        if: hashFiles('sdk/typescript/package.json') != ''
        run: |
          npm install
          npm run build

      - name: Type-check Python SDK
        if: hashFiles('sdk/python/setup.py') != ''
        working-directory: sdk/python
        if: hashFiles('sdk/python/setup.py') != ''
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m mypy --config-file mypy.ini quorum_credit
