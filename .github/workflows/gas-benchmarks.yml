name: Gas Budget Benchmarks

on:
  pull_request:
    paths:
      - "src/**"
      - "docs/benchmarks.json"
      - "tools/benchmark_analyzer.py"
      - ".github/workflows/gas-benchmarks.yml"
  push:
    branches: [main]
    paths:
      - "src/**"
      - "docs/benchmarks.json"
      - "tools/benchmark_analyzer.py"
      - ".github/workflows/gas-benchmarks.yml"

jobs:
  gas-benchmarks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run parameterized gas benchmarks
        run: |
          cargo test --lib gas_benchmark -- --nocapture 2>&1 | tee benchmark_output.txt
        continue-on-error: true

      - name: Extract and parse benchmark measurements
        run: |
          python3 tools/benchmark_analyzer.py docs/benchmarks.json
        continue-on-error: true

      - name: Comment PR with complexity analysis
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const benchmarkOutput = fs.existsSync('benchmark_output.txt')
              ? fs.readFileSync('benchmark_output.txt', 'utf8')
              : '';

            const complexityMatches = benchmarkOutput.match(/Fitted complexity: (\S+)/g) || [];
            const operations = [];

            for (const match of complexityMatches) {
              const complexity = match.split(': ')[1];
              operations.push(`- ${complexity}`);
            }

            const comment = `## Gas Budget Complexity Analysis

${operations.length > 0 ? `Detected complexity classes:\n${operations.join('\n')}` : 'Running complexity analysis...'}

[View full report](benchmark_report.html) (attached to this run)`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Upload benchmark report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: docs/benchmark_report.html
          retention-days: 30

      - name: Check for regression (main branch only)
        if: github.ref == 'refs/heads/main'
        run: |
          python3 tools/benchmark_analyzer.py docs/benchmarks.json
          echo "✓ Benchmark baseline updated"
